services:
  qdrant:
    image: qdrant/qdrant:v1.18
    container_name: qdrant
    ports:
      - "6333:6333" # REST
      - "6334:6334" # gRPC
    volumes:
      - qdrant_data:/qdrant/storage
    restart: unless-stopped

  ollama:
    image: ollama/ollama
    container_name: ollama
    ports:
      - "11434:11434" # Ollama API
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped

  backend:
    build: .
    container_name: showadvisor
    ports:
      - "8080:8080"
    environment:
      QDRANT_URL: http://qdrant:6333
      OLLAMA_URL: http://ollama:11434
    volumes:
      - ./data:/data:ro
    depends_on:
      - qdrant
      - ollama
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/showadvisor", "healthcheck"]   # distroless images don't have curl
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

volumes:
  qdrant_data:
  ollama_data: